name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

         script: |
  git config --global --add safe.directory '*'

  cd /home/ubuntu

  if [ ! -d "aws-cicd-Project" ]; then
    git clone https://github.com/aamin6107/aws-cicd-Project.git
  fi

  cd aws-cicd-Project

  git fetch origin
  git reset --hard origin/main

  sudo docker stop website || true
  sudo docker rm website || true
  sudo docker rmi aws-cicd-project || true

  sudo docker build --no-cache -t aws-cicd-project .

  sudo docker run -d \
    --name website \
    -p 80:80 \
    --restart unless-stopped \
    aws-cicd-project

  sudo docker ps
